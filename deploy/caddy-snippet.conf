# Caddy snippet — merge into /etc/caddy/Caddyfile inside the `mimir.lv {` block.
#
# IMPORTANT: order matters. Add these `handle` blocks BEFORE the generic
# generic `/api/*` handler if you already have one (Caddy matches first-match-wins
# on path handlers within a site block).
#
# After editing:
#   caddy validate --config /etc/caddy/Caddyfile
#   systemctl reload caddy

# AI Act audit HTTP API → mimir-ai-act-api on :8200.
# handle_path strips the /api/ai-act-audit prefix so the FastAPI app sees /audit and /health.
handle_path /api/ai-act-audit/* {
    reverse_proxy localhost:8200
}

# Free lead-magnet landing page (index.html lives in /var/www/ai-act-checker/)
handle /ai-act-checker {
    redir /ai-act-checker/ permanent
}
handle_path /ai-act-checker/* {
    root * /var/www/ai-act-checker
    file_server
}
